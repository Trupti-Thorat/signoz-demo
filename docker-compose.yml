services:

  mysql:
    image: mysql:8.0
    container_name: signoz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: signoz
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - signoz-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  signoz:
    image: signoz/signoz:latest
    container_name: signoz
    restart: unless-stopped
    ports:
      - "3301:8080"
      - "4317:4317"
      - "4318:4318"
    networks:
      - signoz-network
    volumes:
      - signoz_data:/var/lib/signoz
    environment:
      - SIGNOZ_LOCAL_DB_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=my-signoz-secret-key-2024

  signoz-demo:
    image: truptithorat/signoz-demo:latest
    pull_policy: never
    container_name: signoz-demo
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      signoz:
        condition: service_started
    networks:
      - signoz-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/signoz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz:4318
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=trupti.thorat38@gmail.com
      - SPRING_MAIL_PASSWORD=hjux ppxt lyjd ricu
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
      - ALERT_EMAIL_TO=trupti.thorat38@gmail.com

  order-service:
    image: truptithorat/order-service:latest
    pull_policy: never
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      signoz:
        condition: service_started
    networks:
      - signoz-network
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz:4318
      - OTEL_SERVICE_NAME=order-service

  payment-service:
    image: truptithorat/payment-service:latest
    pull_policy: never
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      signoz:
        condition: service_started
    networks:
      - signoz-network
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz:4318
      - OTEL_SERVICE_NAME=payment-service

networks:
  signoz-network:
    driver: bridge

volumes:
  mysql_data:
  signoz_data: