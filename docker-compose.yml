services:

  mysql:
    image: mysql:8.0
    container_name: signoz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: signoz
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - signoz-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  signoz:
    image: signoz/signoz:latest
    container_name: signoz
    restart: unless-stopped
    ports:
      - "3301:3301"
      - "4317:4317"
      - "4318:4318"
    networks:
      - signoz-network
    volumes:
      - signoz_data:/var/lib/signoz

  signoz-demo:
    image: truptithorat/signoz-demo:%BUILD_NUMBER%
    container_name: signoz-demo
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      signoz:
        condition: service_started
    networks:
      - signoz-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/signoz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz:4318

  order-service:
    image: truptithorat/order-service:%BUILD_NUMBER%
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      signoz:
        condition: service_started
    networks:
      - signoz-network
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz:4318

  payment-service:
    image: truptithorat/payment-service:%BUILD_NUMBER%
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      signoz:
        condition: service_started
    networks:
      - signoz-network
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz:4318

networks:
  signoz-network:
    driver: bridge

volumes:
  mysql_data:
  signoz_data: